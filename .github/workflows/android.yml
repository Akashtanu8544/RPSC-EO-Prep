name: Android CI/CD Build and Release

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Debug APK & Release AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Assemble Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7

      # Set up the release signing keystore. If secrets are provided, we decode them.
      # If not, we generate a fallback self-signed keystore to guarantee successful AAB compilation.
      - name: Setup Release Signing Keystore
        id: setup_keystore
        run: |
          if [ -n "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" ]; then
            echo "Decoding release keystore from secrets..."
            echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > my-upload-key.jks
            echo "store_password=${{ secrets.STORE_PASSWORD }}" >> $GITHUB_OUTPUT
            echo "key_password=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_OUTPUT
          else
            echo "No RELEASE_KEYSTORE_BASE64 secret found. Generating fallback keystore..."
            keytool -genkey -v -keystore my-upload-key.jks -alias upload -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=eoro, OU=app, O=eoro, L=Unknown, S=Unknown, C=US" -storepass fallback_password -keypass fallback_password
            echo "store_password=fallback_password" >> $GITHUB_OUTPUT
            echo "key_password=fallback_password" >> $GITHUB_OUTPUT
          fi

      - name: Build Release Bundle (AAB)
        run: ./gradlew :app:bundleRelease --no-daemon
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
          STORE_PASSWORD: ${{ steps.setup_keystore.outputs.store_password }}
          KEY_PASSWORD: ${{ steps.setup_keystore.outputs.key_password }}

      - name: Upload Release AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 7
